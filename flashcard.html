<!DOCTYPE html>
<html>
<head>
<title>Flashcard</title>
</head>
<body>



<button onclick="window.location.href='index.html'">
← Trang chủ
</button>

<div class="section">
<h2>📔 Flashcard</h2>
<div style="text-align:center;padding:20px;">

<div id="flashcard"
style="
background:#f5f7ff;
padding:60px 20px;
border-radius:20px;
font-size:30px;
font-weight:bold;
margin-bottom:20px;
cursor:pointer;
">
안녕하세요
</div>

<div id="meaningBox"
style="
font-size:20px;
display:none;
margin-bottom:20px;
">
annyeonghaseyo<br>
Xin chào
</div>

<button onclick="toggleMeaning()"
style="
padding:10px 20px;
background:#122c5a;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
">
Hiện nghĩa
</button>

<br><br>

<button onclick="prevCard()"
style="
padding:10px 20px;
background:#122c5a;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
">
← Trước
</button>

<button onclick="nextCard()"
style="
padding:10px 20px;
background:#122c5a;
color:white;
border:none;
border-radius:8px;
margin-left:10px;
cursor:pointer;
font-size:14px;    
">
Sau →
</button>

</div>
    
<script>  
    
let currentCard = 0;
let showMeaning = false;

function renderFlashcard(){

    if(words.length === 0){
        document.getElementById("flashcardBox").innerHTML =
        "Chưa có từ vựng";
        return;
    }

    let word = words[currentCard];

    if(showMeaning){

        document.getElementById("flashcardBox").innerHTML =
        `
        <div>
            <div>${word.korean}</div>
            <hr>
            <div>${word.pronunciation}</div>
            <div>${word.meaning}</div>
        </div>
        `;

    }else{

        document.getElementById("flashcardBox").innerHTML =
        word.korean;

    }
}

document.addEventListener("click",function(e){

    if(e.target.id==="flashcardBox"){
        showMeaning=!showMeaning;
        renderFlashcard();
    }

});

function nextCard(){

    if(words.length===0) return;

    currentCard++;

    if(currentCard>=words.length){
        currentCard=0;
    }

    showMeaning=false;
    renderFlashcard();
}

function prevCard(){

    if(words.length===0) return;

    currentCard--;

    if(currentCard<0){
        currentCard=words.length-1;
    }

    showMeaning=false;
    renderFlashcard();
}
function generateQuiz(){
    
answered = false;
    document.getElementById("quizResult").innerHTML = "";
    document.getElementById("nextQuizBtn").style.display = "none";
    if(words.length < 4){
        alert("Cần ít nhất 4 từ");
        return;
    }

    const correct =
    words[Math.floor(Math.random()*words.length)];

    let options = [correct.meaning];

    while(options.length < 4){

        let random =
        words[Math.floor(Math.random()*words.length)].meaning;

        if(!options.includes(random)){
            options.push(random);
        }
    }

    options.sort(() => Math.random() - 0.5);

    let html =
    `<h3>${correct.korean} nghĩa là gì?</h3>`;

    options.forEach(option=>{

        html += `
        <p>
        <button
class="quiz-option"
data-answer="${option}"
onclick="
checkAnswer('${option}','${correct.meaning}')
"
style="
padding:10px 15px;
margin:5px 0;
width:100%;
border:none;
border-radius:8px;
background:#f5f5f5;
cursor:pointer;
font-size:16px;
">
        ${option}
        </button>
        </p>
        `;
    });

    document.getElementById("quizContent").innerHTML =
    html;
}    

function renderFlashcard(){

    if(words.length===0){
        return;
    }

    document.getElementById("flashcard").innerText =
        words[currentCard].korean;

    document.getElementById("meaningBox").innerHTML =
        words[currentCard].pronunciation +
        "<br>" +
        words[currentCard].meaning;

    document.getElementById("meaningBox").style.display =
        showMeaning ? "block" : "none";
}

function toggleMeaning(){
    showMeaning = !showMeaning;
    renderFlashcard();
}

function nextCard(){

    if(words.length===0) return;

    currentCard++;

    if(currentCard >= words.length){
        currentCard = 0;
    }

    showMeaning = false;
    renderFlashcard();
}

function prevCard(){

    if(words.length===0) return;

    currentCard--;

    if(currentCard < 0){
        currentCard = words.length - 1;
    }

    showMeaning = false;
    renderFlashcard();
}     

</script>    
</body>
</html>
