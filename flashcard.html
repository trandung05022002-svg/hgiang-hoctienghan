<!DOCTYPE html>
<html>
<head>
<title>Flashcard</title>
</head>
<body>



<button onclick="window.location.href='index.html'">
← Trang chủ
</button>

<div class="section">
<h2>📔 Flashcard</h2>
<div style="text-align:center;padding:20px;">

<div id="flashcard"
style="
background:#f5f7ff;
padding:60px 20px;
border-radius:20px;
font-size:30px;
font-weight:bold;
margin-bottom:20px;
cursor:pointer;
">
안녕하세요
</div>

<div id="meaningBox"
style="
font-size:20px;
display:none;
margin-bottom:20px;
">
annyeonghaseyo<br>
Xin chào
</div>

<button onclick="toggleMeaning()"
style="
padding:10px 20px;
background:#122c5a;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
">
Hiện nghĩa
</button>

<br><br>

<button onclick="prevCard()"
style="
padding:10px 20px;
background:#122c5a;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
">
← Trước
</button>

<button onclick="nextCard()"
style="
padding:10px 20px;
background:#122c5a;
color:white;
border:none;
border-radius:8px;
margin-left:10px;
cursor:pointer;
font-size:14px;    
">
Sau →
</button>

</div>
  
</body>
</html>
