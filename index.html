<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HGIANG HỌC TIẾNG HÀN</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
display:flex;
min-height:100vh;
}

.sidebar{
width:260px;
background:#122c5a;
color:white;
padding:30px 20px;
}

.logo{
font-size:24px;
font-weight:bold;
text-align:center;
margin-bottom:40px;
}

.logo-circle{
width:70px;
height:70px;
border-radius:50%;
background:white;
color:#122c5a;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
font-weight:bold;
margin:0 auto 15px;
}

.menu{
list-style:none;
}

.menu li{
padding:14px;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;
}

.menu li:hover{
background:rgba(255,255,255,.15);
}

.content{
flex:1;
padding:25px;
}

.top-title{
font-size:30px;
font-weight:bold;
margin-bottom:25px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h3{
color:#888;
margin-bottom:10px;
}

.big{
font-size:32px;
font-weight:bold;
color:#122c5a;
}

.section{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
margin-bottom:20px;
}

.section h2{
margin-bottom:15px;
}

.flashcard{
height:220px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:bold;
background:#f6f8fd;
border-radius:15px;
color:#122c5a;
}

.quiz-box{
padding:20px;
background:#f6f8fd;
border-radius:15px;
}

.btn{
padding:12px 20px;
border:none;
border-radius:10px;
background:#122c5a;
color:white;
cursor:pointer;
margin-top:15px;
}

@media(max-width:768px){

body{
flex-direction:column;
}

.sidebar{
width:100%;
}

.content{
padding:15px;
}

.flashcard{
font-size:28px;
}

}
</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
<div class="logo-circle">HG</div>
HGIANG<br>HỌC TIẾNG HÀN
</div>

<ul class="menu">
<li>🏠 Dashboard</li>
<li>📚 Từ vựng</li>
<li>🎴 Flashcard</li>
<li>📝 Quiz</li>
<li>🎮 Trò chơi</li>
<li>📊 Thống kê</li>
<li>⚙️ Cài đặt</li>
</ul>

</div>

<div class="content">

<div class="top-title">
🇰🇷 HGIANG HỌC TIẾNG HÀN
</div>

<div class="cards">

<div class="card">
<h3>Tổng từ vựng</h3>
<div class="big" id="totalWords">0</div>
</div>

<div class="card">
<h3>Đã học</h3>
<div class="big">0</div>
</div>

<div class="card">
<h3>Điểm số</h3>
<div class="big">0</div>
</div>

<div class="card">
<h3>Chuỗi ngày học</h3>
<div class="big">0</div>
</div>

</div>

<div class="section">
<h2>📔 Flashcard</h2>
<div style="text-align:center;padding:20px;">

<div id="flashcard"
style="
background:#f5f7ff;
padding:60px 20px;
border-radius:20px;
font-size:48px;
font-weight:bold;
margin-bottom:20px;
cursor:pointer;
">
안녕하세요
</div>

<div id="meaningBox"
style="
font-size:28px;
display:none;
margin-bottom:20px;
">
annyeonghaseyo<br>
Xin chào
</div>

<button onclick="toggleMeaning()"
style="
padding:10px 20px;
background:#122c5a;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
">
Hiện nghĩa
</button>

<br><br>

<button onclick="prevCard()"
style="
padding:10px 20px;
background:#122c5a;
color:white;
border:none;
border-radius:8px;
">
← Trước
</button>

<button onclick="nextCard()"
style="
padding:10px 20px;
background:#122c5a;
color:white;
border:none;
border-radius:8px;
margin-left:10px;
">
Sau →
</button>

</div>
<h2>📝 Quiz</h2>

<div class="quiz-box" id="quizBox">

<button onclick="generateQuiz()"
style="
padding:10px 20px;
background:#122c5a;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
">
Tạo câu hỏi
</button>

<div id="quizContent" style="margin-top:20px;"></div>

</div>

</div>

</div>
<div style="background:white;margin:20px;padding:20px;border-radius:20px;">
    <h2>➕ Thêm từ vựng</h2>

    <input id="korean" placeholder="Tiếng Hàn"
        style="padding:10px;margin:5px;">

    <input id="pronunciation" placeholder="Phiên âm"
        style="padding:10px;margin:5px;">

    <input id="meaning" placeholder="Nghĩa"
        style="padding:10px;margin:5px;">

    <button onclick="addWord()"
        style="padding:10px 20px;background:#122c5a;color:white;border:none;border-radius:8px;">
        Thêm từ
    </button>
<br><br>

<input type="file" id="excelFile">

<button onclick="importExcel()"
style="padding:10px 20px;
background:green;
color:white;
border:none;
border-radius:8px;
margin-left:10px;">
Import Excel
</button>
    <div id="wordList" style="margin-top:20px;"></div>
</div>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script>
let words = JSON.parse(localStorage.getItem('words')) || [];

function renderWords() {
    let html = '';

words.forEach((word,index) => {
html += `
<div style="padding:10px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;">
    <span>
        <b>${word.korean}</b> - ${word.pronunciation} - ${word.meaning}
    </span>

    <button onclick="deleteWord(${index})"
        style="background:red;color:white;border:none;padding:5px 10px;border-radius:5px;">
        X
    </button>
</div>
`;
    });

    document.getElementById('wordList').innerHTML = html;
    document.getElementById('totalWords').innerText = words.length;
}

function addWord() {

    const korean =
        document.getElementById('korean').value;

    const pronunciation =
        document.getElementById('pronunciation').value;

    const meaning =
        document.getElementById('meaning').value;

    if (!korean || !meaning) return;

    words.push({
        korean,
        pronunciation,
        meaning
    });

    localStorage.setItem(
        'words',
        JSON.stringify(words)
    );

    renderWords();

    document.getElementById('korean').value = '';
    document.getElementById('pronunciation').value = '';
    document.getElementById('meaning').value = '';
}
function deleteWord(index){

    words.splice(index,1);

    localStorage.setItem(
        'words',
        JSON.stringify(words)
    );

    renderWords();
}
function importExcel(){

    const file =
    document.getElementById('excelFile').files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){

        const data = new Uint8Array(e.target.result);

        const workbook =
        XLSX.read(data,{type:'array'});

        const sheet =
        workbook.Sheets[workbook.SheetNames[0]];

        const rows =
        XLSX.utils.sheet_to_json(sheet,{header:1});

        rows.slice(1).forEach(row=>{

            if(row[0]){

                words.push({
                    korean: row[0] || "",
                    pronunciation: row[1] || "",
                    meaning: row[2] || ""
                });

            }

        });

        localStorage.setItem(
            'words',
            JSON.stringify(words)
        );

        renderWords();

        alert("Import thành công!");
    };

    reader.readAsArrayBuffer(file);
}
let currentCard = 0;
let showMeaning = false;

function renderFlashcard(){

    if(words.length === 0){
        document.getElementById("flashcardBox").innerHTML =
        "Chưa có từ vựng";
        return;
    }

    let word = words[currentCard];

    if(showMeaning){

        document.getElementById("flashcardBox").innerHTML =
        `
        <div>
            <div>${word.korean}</div>
            <hr>
            <div>${word.pronunciation}</div>
            <div>${word.meaning}</div>
        </div>
        `;

    }else{

        document.getElementById("flashcardBox").innerHTML =
        word.korean;

    }
}

document.addEventListener("click",function(e){

    if(e.target.id==="flashcardBox"){
        showMeaning=!showMeaning;
        renderFlashcard();
    }

});

function nextCard(){

    if(words.length===0) return;

    currentCard++;

    if(currentCard>=words.length){
        currentCard=0;
    }

    showMeaning=false;
    renderFlashcard();
}

function prevCard(){

    if(words.length===0) return;

    currentCard--;

    if(currentCard<0){
        currentCard=words.length-1;
    }

    showMeaning=false;
    renderFlashcard();
}
function generateQuiz(){

    if(words.length < 4){
        alert("Cần ít nhất 4 từ");
        return;
    }

    const correct =
    words[Math.floor(Math.random()*words.length)];

    let options = [correct.meaning];

    while(options.length < 4){

        let random =
        words[Math.floor(Math.random()*words.length)].meaning;

        if(!options.includes(random)){
            options.push(random);
        }
    }

    options.sort(() => Math.random() - 0.5);

    let html =
    `<h3>${correct.korean} nghĩa là gì?</h3>`;

    options.forEach(option=>{

        html += `
        <p>
        <button onclick="
        if('${option}'==='${correct.meaning}')
        {
            alert('Chính xác!');
        }
        else
        {
            alert('Sai rồi!');
        }
        ">
        ${option}
        </button>
        </p>
        `;
    });

    document.getElementById("quizContent").innerHTML =
    html;
}    
let currentCard = 0;
let showMeaning = false;

function renderFlashcard(){

    if(words.length===0){
        return;
    }

    document.getElementById("flashcard").innerText =
        words[currentCard].korean;

    document.getElementById("meaningBox").innerHTML =
        words[currentCard].pronunciation +
        "<br>" +
        words[currentCard].meaning;

    document.getElementById("meaningBox").style.display =
        showMeaning ? "block" : "none";
}

function toggleMeaning(){
    showMeaning = !showMeaning;
    renderFlashcard();
}

function nextCard(){

    if(words.length===0) return;

    currentCard++;

    if(currentCard >= words.length){
        currentCard = 0;
    }

    showMeaning = false;
    renderFlashcard();
}

function prevCard(){

    if(words.length===0) return;

    currentCard--;

    if(currentCard < 0){
        currentCard = words.length - 1;
    }

    showMeaning = false;
    renderFlashcard();
}    
renderWords();
renderFlashcard();
</script>



  
</body>
</html>
