<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thư viện từ vựng</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f7fb;
    padding:30px;
}

.box{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    cursor:pointer;
    font-size:22px;
    font-weight:bold;
}

.lesson{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

.lesson button{
    margin-left:10px;
    padding:5px 12px;
}
    
.back{
    padding:10px 20px;
    background:#122c5a;
    color:white;
    border:none;
    border-radius:8px;
    text-decoration:none;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    
</head>

<body>

<a href="index.html" class="back">
← Trang chủ
</a>

<h1 style="margin-top:20px;">
📚 THƯ VIỆN
</h1>

<div class="box" onclick="toggleHSK1()">
▶ HSK1
</div>

<div id="hsk1Content" style="display:none; margin-left:30px;">

<button id="addFileBtn" style="
padding:10px 15px;
margin-bottom:15px;
background:#122c5a;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
">
➕ Thêm file Excel
</button>

<input
type="file"
id="excelFile"
accept=".xlsx,.xls"
style="display:none;">  
    
<div id="fileList"></div>    

<div id="reviewBox"
style="
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
display:none;
">
</div>
    
    <div class="lesson">
        📚 Ôn tập HSK1
        <button>Review</button>
        <button>Học</button>
    </div>

</div>

<div class="box">
▶ HSK2
</div>

<div class="box">
▶ HSK3
</div>

<div class="box">
▶ HSK4
</div>

<script>

function renderHSK1Files(){

    let files =
    JSON.parse(localStorage.getItem("hsk1Files"))
    || [];

    let html = "";

    files.forEach(file => {

html += `
<div class="lesson">

    📄 ${file}

<button onclick="reviewFile(${index})">
Review
</button>

    <button>Học</button>

    <button onclick="deleteFile('${file}')">
        Xóa
    </button>

</div>
`;

    });

    document.getElementById("fileList")
    .innerHTML = html;

}

function deleteFile(fileName){

    if(!confirm("Xóa " + fileName + " ?")){
        return;
    }

    let files =
    JSON.parse(localStorage.getItem("hsk1Files"))
    || [];

    files = files.filter(
        file => file !== fileName
    );

    localStorage.setItem(
        "hsk1Files",
        JSON.stringify(files)
    );

    renderHSK1Files();

}    
    
function toggleHSK1(){

    let box = document.getElementById("hsk1Content");

    if(box.style.display === "none"){
        box.style.display = "block";
    }else{
        box.style.display = "none";
    }

}

document
.getElementById("addFileBtn")
.addEventListener("click", function(){

    document
    .getElementById("excelFile")
    .click();

});

document
.getElementById("excelFile")
.addEventListener("change", function(e){

    const file = e.target.files[0];

if(file){

    const reader = new FileReader();

    reader.onload = function(e){

        const data =
        new Uint8Array(e.target.result);

        const workbook =
        XLSX.read(data,{type:"array"});

        const sheet =
        workbook.Sheets[
            workbook.SheetNames[0]
        ];

        const rows =
        XLSX.utils.sheet_to_json(
            sheet,
            {header:1}
        );

        const fileWords = [];

        rows.slice(1).forEach(row=>{

            if(row[0]){

                fileWords.push({
                    korean: row[0] || "",
                    pronunciation: row[1] || "",
                    meaning: row[2] || ""
                });

            }

        });

        let files =
        JSON.parse(localStorage.getItem("hsk1Files"))
        || [];

        files.push({
            name:file.name,
            words:fileWords
        });

        localStorage.setItem(
            "hsk1Files",
            JSON.stringify(files)
        );

        renderHSK1Files();

    };

function reviewFile(index){

    let files =
    JSON.parse(
        localStorage.getItem("hsk1Files")
    ) || [];

    let file = files[index];

    let html = `
    <h3>${file.name}</h3>

    <table border="1"
    cellpadding="8"
    style="border-collapse:collapse;width:100%;">
        <tr>
            <th>Tiếng Hàn</th>
            <th>Phiên âm</th>
            <th>Nghĩa</th>
        </tr>
    `;

    file.words.forEach(word=>{

        html += `
        <tr>
            <td>${word.korean}</td>
            <td>${word.pronunciation}</td>
            <td>${word.meaning}</td>
        </tr>
        `;

    });

    html += "</table>";

    document.getElementById("reviewBox").innerHTML = html;
    document.getElementById("reviewBox").style.display = "block";
}
    
    reader.readAsArrayBuffer(file);

}
renderHSK1Files();    
</script>
    
</body>
</html>
